<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <!-- <link rel="stylesheet" href="style2.css"> -->
    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Mono:ital,wght@0,200..800;1,200..800&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
    
    <section>
        <!-- sign up START -->
        <div class="sign-in">
            <h1>Sign in</h1>
            <div class="social-media">
                <div class="github">  <img src="img/github-icon.png" alt=""></div>
                <div class="facebook">    <img src="img/facebook-icon.png" alt=""></div>
                <div class="linkedin">  <img src="img/linkedin-icon-614x460.png " alt=""></div>
            </div>
            <p class="suggest-text">or use your account</p>
            
            <form action="" method="post">
                <div class="input">
                    <input type="text" name="email" id="email" placeholder="Email" class="custom-placeholder" required>
                </div>
                <div class="input">
                    <input type="password" name="password" id="password" placeholder="Password" required>
                </div>
                <p class="suggest-text">Forgot your password?</p>
                <input type="submit" value="Sign in">
            </form>
        </div>
        <!-- sign up END -->

        <!-- cover sign up START -->
        <div class="cover cover-sign-up toggle-cover-right">
                <h1>Hello, Everyone!</h1>
                <h4>This is just cover Page , Do not mind too much</h4>
                <h4>Let see what i made!</h4>
                <input type="submit" value="Sign up" id="cover-btn-sign-up-in" class="cover-btn ">
        </div>
        <!-- cover sign up END -->

         
        
        <!-- sign up START -->
        <div class="sign-up">
            <h1>Sign up</h1>
            <p class="suggest-text">Create an account</p>
            
            <form action="" method="post">
                <div class="input">
                    <input type="text" name="email" id="email" placeholder="Email" required>
                </div>
                <div class="input">
                    <input type="text" name="name" id="name" placeholder="Name" required>
                </div>
                <div class="input">
                    <input type="password" name="password1" id="password1" placeholder="Password" required>
                </div>
                <div class="input">
                    <input type="password" name="password2" id="password2" placeholder="Confirm Password" required>
                </div>
                <p class="suggest-text">or sign-up with</p>
                
                <div class="social-media">
                    <div class="github">    <img src="img/github-icon.png" alt=""></div>
                    <div class="facebook">  <img src="img/facebook-icon.png" alt=""></div>
                    <div class="linkedin">   <img src="img/linkedin-icon-614x460.png" alt=""></div>
                </div>
                <input type="submit" value="Sign in">
            </form>
        </div>
        <!-- sign up END -->
    </section>
    
    <!-- <script src="src/scripts.js"></script> -->
    <script src="src/scripts.js"></script>
</body>
</html>
